<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz Game</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="screen active" id="start-screen">
        <h1>Quiz Time!</h1>
        <p>Test your knowledge with these fun questions!</p>
        <button id="start-btn">Start Quiz</button>
      </div>

      <div class="screen" id="quiz-screen">
        <div class="question-header">
          <h2 id="question-text"></h2>
          <div class="question-info">
            <p>
              Question <span id="current-question">1</span> of
              <span id="total-questions">5</span>
            </p>
            <p>Score: <span id="score">0</span></p>
          </div>
          <div class="answer-container" id="answer-container">
            <!-- all question will be displayed here -->
          </div>
          <div class="progress-bar">
            <div class="progress" id="progress"></div>
          </div>
        </div>
      </div>

      <div class="result screen" id="result-screen">
        <h1>Quiz Results</h1>
        <div class="result-info">
          <p>
            Your scored <span id="final-score">0</span> out of
            <span id="max-score">5</span>
          </p>
          <div id="result-message">Good job!</div>
          <button id="restart-btn">Restart Quiz</button>
        </div>
      </div>
    </div>

    <!-- JS -->
    <script src="script.js"></script>
  </body>
</html>
